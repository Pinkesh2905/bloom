{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    .editor-glass {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 3rem;
    }
    .input-neon {
        background: transparent;
        border: none;
        border-bottom: 2px solid rgba(255, 255, 255, 0.05);
        color: white;
        transition: all 0.3s;
    }
    .input-neon:focus {
        border-bottom-color: #6366f1;
        outline: none;
    }
    input[type=range] {
        -webkit-appearance: none;
        background: rgba(255, 255, 255, 0.05);
        height: 6px;
        border-radius: 10px;
    }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        background: #fff;
        border: 4px solid #6366f1;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
    }
</style>
{% endblock %}

{% block content %}
<div class="min-h-screen py-20 px-4 flex items-center justify-center bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900/20 via-slate-950 to-slate-950">
    <div class="max-w-5xl w-full">
        <!-- Header -->
        <div class="flex justify-between items-center mb-12 reveal">
            <a href="{% url 'journal_list' %}" class="text-indigo-300/30 hover:text-white transition-all flex items-center gap-2">
                <i class="fas fa-times text-xl"></i>
                <span class="text-xs font-black uppercase tracking-widest">Abort Transmission</span>
            </a>
            <div class="text-center">
                <span class="text-[10px] font-black tracking-[0.4em] text-indigo-500 uppercase">Neural Uplink Active</span>
                <h2 class="text-white font-black text-2xl tracking-tighter">{% if form.instance.pk %}Synchronizing Entry{% else %}New Reflection{% endif %}</h2>
            </div>
            <div class="w-24"></div> <!-- Spacer -->
        </div>

        <form method="post" enctype="multipart/form-data" class="reveal">
            {% csrf_token %}
            <div class="editor-glass p-12 md:p-20 shadow-2xl">
                <!-- Title Input -->
                <div class="mb-16">
                    <input type="text" name="title" value="{{ form.title.value|default:'' }}" 
                           placeholder="Transmission Subject..." 
                           class="input-neon w-full text-5xl md:text-7xl font-black placeholder-white/5 py-4">
                </div>

                <!-- Mood & Intensity Grid -->
                <div class="grid md:grid-cols-2 gap-12 mb-16">
                    <div class="space-y-4">
                        <label class="text-[10px] font-black text-indigo-300/50 uppercase tracking-widest">Emotional Signature</label>
                        <select name="mood" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                            {% for val, label in form.fields.mood.choices %}
                            <option value="{{ val }}" {% if form.mood.value == val %}selected{% endif %} class="bg-indigo-950">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-black text-indigo-300/50 uppercase tracking-widest">Intensity Index</label>
                            <span id="intensity-val" class="text-indigo-400 font-bold text-xs">5</span>
                        </div>
                        <input type="range" name="mood_intensity" min="1" max="10" 
                               value="{{ form.mood_intensity.value|default:5 }}" 
                               oninput="document.getElementById('intensity-val').textContent = this.value"
                               class="w-full mt-2">
                    </div>
                </div>

                <!-- Content Area -->
                <div class="mb-16">
                    <label class="text-[10px] font-black text-indigo-300/50 uppercase tracking-widest mb-4 block">Neural Data</label>
                    <textarea name="content" rows="12" 
                              placeholder="Flow states, cognitive dissonance, emotional peaks..." 
                              class="w-full bg-white/5 border border-white/10 rounded-3xl p-8 text-white text-xl font-medium placeholder-white/5 focus:ring-2 focus:ring-indigo-500 outline-none transition-all resize-none">{{ form.content.value|default:'' }}</textarea>
                </div>

                <!-- Tags & Attachments -->
                <div class="grid md:grid-cols-2 gap-12 mb-16">
                    <div class="space-y-4">
                        <label class="text-[10px] font-black text-indigo-300/50 uppercase tracking-widest">Metadata Tags</label>
                        <input type="text" name="tags_input" value="{{ form.tags_input.value|default:'' }}" 
                               placeholder="work, health, awakening..." 
                               class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>

                    <div class="space-y-4">
                        <label class="text-[10px] font-black text-indigo-300/50 uppercase tracking-widest">Visual Anchor</label>
                        <div class="relative group">
                            <input type="file" name="image_attachment" 
                                   class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="w-full py-4 px-6 bg-white/5 border border-dashed border-white/20 rounded-2xl text-indigo-300/50 text-sm flex items-center gap-3 transition-all group-hover:border-indigo-500/50 group-hover:bg-white/10">
                                <i class="fas fa-image"></i>
                                <span>Upload Neural Frame</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Submit Area -->
                <div class="flex flex-col md:flex-row items-center gap-8 justify-between pt-12 border-t border-white/5">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" name="is_favorite" {% if form.is_favorite.value %}checked{% endif %} class="hidden">
                        <div class="w-10 h-10 rounded-xl border border-white/10 flex items-center justify-center text-indigo-300/20 group-hover:border-amber-400 group-hover:text-amber-400 transition-all peer-checked:bg-amber-400 peer-checked:text-white">
                            <i class="fas fa-star text-xs"></i>
                        </div>
                        <span class="text-xs font-black text-white/40 uppercase tracking-widest group-hover:text-white transition-colors">Mark as Vital Memory</span>
                    </label>

                    <button type="submit" class="w-full md:w-auto px-12 py-5 bg-white text-indigo-950 font-black rounded-2xl hover:bg-indigo-50 transition-all shadow-[0_0_30px_rgba(255,255,255,0.1)] hover:shadow-[0_0_50px_rgba(255,255,255,0.2)]">
                        Initialize Transmission
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    // Update intensity value on load
    window.onload = function() {
        const slider = document.querySelector('input[type=range]');
        if (slider) {
            document.getElementById('intensity-val').textContent = slider.value;
        }
    }
</script>
{% endblock %}
