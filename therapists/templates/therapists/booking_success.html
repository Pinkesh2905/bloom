{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-6">
    <div class="max-w-xl w-full text-center">
        <!-- Success Icon -->
        <div class="relative w-32 h-32 mx-auto mb-12">
            <div class="absolute inset-0 bg-[#d9f99d] rounded-full blur-2xl opacity-20 animate-pulse"></div>
            <div class="relative w-full h-full bg-white/5 border border-[#d9f99d]/20 rounded-full flex items-center justify-center text-[#d9f99d] shadow-[0_0_30px_rgba(217,249,157,0.1)]">
                <i class="fas fa-calendar-check text-4xl"></i>
            </div>
            <!-- Floating Particles -->
            <div class="absolute -top-4 -right-4 w-3 h-3 bg-blue-400 rounded-full blur-sm animate-bounce"></div>
            <div class="absolute -bottom-2 -left-4 w-2 h-2 bg-[#d9f99d] rounded-full blur-sm animate-pulse"></div>
        </div>

        <h1 class="text-5xl font-bold font-unbounded text-white mb-6 tracking-tight">
            Booking <span class="text-[#d9f99d]">Confirmed</span>
        </h1>
        
        <p class="text-slate-400 font-syne text-xl mb-12 leading-relaxed">
            Your high-performance session has been successfully allocated. You will receive a secure confirmation protocol via email shortly.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
            <a href="{% url 'therapists:therapist_list' %}" 
               class="px-10 py-5 bg-[#d9f99d] text-[#0a0f1e] text-xs font-bold font-unbounded rounded-2xl uppercase tracking-widest hover:scale-105 shadow-[0_20px_40px_rgba(217,249,157,0.15)] transition-all">
                Return to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
