{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<style>
    .auth-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .input-field {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .input-field:focus {
        border-color: #d9f99d;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 0 0 4px rgba(217, 249, 157, 0.1);
    }

    .auth-bg-glow {
        position: absolute;
        width: 40vw;
        height: 40vw;
        background: radial-gradient(circle, rgba(217, 249, 157, 0.05) 0%, transparent 70%);
        top: 20%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 0;
    }
</style>
{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center pt-32 pb-20 px-6 bg-bloom-dark relative overflow-hidden">
    <div class="auth-bg-glow"></div>
    
    <div class="w-full max-w-md relative z-10">
        <div class="auth-card p-10 md:p-12 reveal">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/5 border border-white/10 mb-6">
                    <i class="fas fa-lock text-bloom-neon text-xl"></i>
                </div>
                <h1 class="text-3xl font-unbounded font-black tracking-tight text-white uppercase mb-3">
                    Welcome <span class="text-bloom-neon text-gradient">Back.</span>
                </h1>
                <p class="text-sm text-white/40 font-syne tracking-wide">
                    Access your therapist command center
                </p>
            </div>
    
            {% if form.errors %}
                <div class="bg-red-500/10 border border-red-500/20 text-red-100 px-5 py-4 rounded-2xl text-xs font-syne mb-8 animate-shake">
                    <div class="flex items-center gap-3">
                        <i class="fas fa-exclamation-circle text-red-400"></i>
                        <span>Invalid credentials. Mission aborted.</span>
                    </div>
                </div>
            {% endif %}
    
            <form method="post" action="{% url 'login' %}" class="space-y-6">
                {% csrf_token %}
                <div class="space-y-2">
                    <label for="id_username" class="text-[10px] font-unbounded font-black text-white/30 uppercase tracking-widest pl-1">Identifier</label>
                    <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="254" required id="id_username" 
                           placeholder="Email or Username"
                           class="input-field w-full h-14 px-5 rounded-2xl font-syne text-sm focus:outline-none">
                </div>
                
                <div class="space-y-2">
                    <label for="id_password" class="text-[10px] font-unbounded font-black text-white/30 uppercase tracking-widest pl-1">Security Key</label>
                    <input type="password" name="password" autocomplete="current-password" required id="id_password" 
                           placeholder="••••••••"
                           class="input-field w-full h-14 px-5 rounded-2xl font-syne text-sm focus:outline-none">
                </div>
    
                <div class="pt-4">
                    <button type="submit" class="w-full h-14 bg-bloom-neon text-bloom-dark font-unbounded font-black uppercase text-[10px] tracking-widest rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-[0_10px_30px_rgba(217,249,157,0.2)]">
                        Initialize Session
                    </button>
                </div>

                <div class="mt-8 text-center">
                    <p class="text-[10px] font-unbounded font-black text-white/20 uppercase tracking-widest">
                        New practitioner? <a href="{% url 'therapists:therapist_signup' %}" class="text-bloom-neon hover:underline decoration-2 underline-offset-4 ml-1">Register here</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</section>

<script>
    // Initial reveal animation
    window.addEventListener('load', () => {
        document.querySelector('.reveal').classList.add('opacity-100', 'translate-y-0');
        document.querySelector('.reveal').classList.remove('opacity-0', 'translate-y-8');
    });

    const card = document.querySelector('.reveal');
    card.classList.add('opacity-0', 'translate-y-8', 'transition-all', 'duration-1000', 'ease-out');
</script>
{% endblock %}
